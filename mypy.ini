[mypy]
# =============================================================================
# GLOBAL CONFIGURATION - Strict type checking for new code
# =============================================================================
# These settings enforce strict type checking for any new code that doesn't have
# specific ignore rules. This ensures new development follows type safety standards.

# Function and method type annotations
disallow_untyped_defs = True          # Require return type annotations for all functions
disallow_incomplete_defs = True       # Require type annotations for all function parameters
check_untyped_defs = True            # Type check the body of functions without type annotations

# Decorator and optional handling
disallow_untyped_decorators = True    # Require type annotations for decorators
no_implicit_optional = True          # Don't make parameters optional by default

# Warning settings
warn_redundant_casts = True          # Warn about unnecessary type casts
warn_unused_ignores = True           # Warn about unused type ignore comments
warn_return_any = True               # Warn when functions return Any type
warn_unreachable = True              # Warn about unreachable code
strict_equality = True               # Warn about equality comparisons with incompatible types

# Python version and display settings
python_version = 3.10                # Target Python version for type checking
show_error_codes = True              # Show error codes in output for easier debugging
follow_imports = silent              # Don't show import resolution messages

# External library handling
ignore_missing_imports = True        # Don't error on missing imports for external libraries

# =============================================================================
# EXISTING CODE IGNORE RULES - Progressive typing strategy
# =============================================================================
# These sections ignore type errors in existing code, allowing gradual improvement.
# As you add type annotations to existing code, you can remove these ignore rules.

# Main SDK modules - ignore all type errors for now
[mypy-story_protocol_python_sdk.story_client]
ignore_errors = True                 # Ignore all type errors in story_client.py

[mypy-story_protocol_python_sdk.resources.*]
ignore_errors = True                 # Ignore all type errors in resources module

[mypy-story_protocol_python_sdk.abi.*]
ignore_errors = True                 # Ignore all type errors in ABI modules

[mypy-story_protocol_python_sdk.utils.*]
ignore_errors = True                 # Ignore all type errors in utils module

[mypy-story_protocol_python_sdk.types.*]
ignore_errors = True                 # Ignore all type errors in types module

[mypy-story_protocol_python_sdk.scripts.*]
ignore_errors = True                 # Ignore all type errors in scripts module

# Test files - ignore all type errors
[mypy-tests.*]
ignore_errors = True                 # Ignore all type errors in test files

# =============================================================================
# EXTERNAL LIBRARY CONFIGURATION
# =============================================================================
# These libraries don't have type stubs, so we ignore missing import errors

[mypy-web3.*]
ignore_missing_imports = True        # Web3 library doesn't have complete type stubs

[mypy-dotenv.*]
ignore_missing_imports = True        # python-dotenv doesn't have type stubs

[mypy-base58.*]
ignore_missing_imports = True        # base58 library doesn't have type stubs

[mypy-pytest.*]
ignore_missing_imports = True        # pytest doesn't have complete type stubs
